<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국민통합위 3건 통합 일정 간트차트</title>
<style>
  :root{
    --gen:#3b82f6;
    --gen-detail:#0f766e;
    --econ:#10b981;
    --listen:#f59e0b;
    --grid:#e5e7eb;
    --grid-strong:#cbd5e1;
    --ink:#1f2937;
    --muted:#6b7280;
    --bg:#ffffff;
    --left-w:320px;
    --day-w:7px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    padding:24px;
    background:#f8fafc;
    color:var(--ink);
    font-family:'Pretendard','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  }
  h1{font-size:20px;margin:0 0 4px;}
  .sub{color:var(--muted);font-size:13px;margin-bottom:14px;}
  .tabs{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin:0 0 14px;
  }
  .tab{
    border:1px solid var(--grid-strong);
    background:#fff;
    color:var(--ink);
    border-radius:7px;
    padding:7px 12px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
  }
  .tab.active{
    background:#111827;
    border-color:#111827;
    color:#fff;
  }
  .panel{display:none;}
  .panel.active{display:block;}
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:14px;font-size:13px;align-items:center;}
  .legend .item{display:flex;align-items:center;gap:6px;}
  .legend .note{color:var(--muted);}
  .swatch{width:14px;height:14px;border-radius:3px;display:inline-block;}
  .chart-wrap{
    background:var(--bg);
    border:1px solid var(--grid);
    border-radius:8px;
    overflow-x:auto;
    box-shadow:0 1px 3px rgba(0,0,0,.06);
  }
  table.gantt{border-collapse:collapse;width:max-content;min-width:100%;}
  .gantt th,.gantt td{padding:0;}
  .corner{
    position:sticky;
    left:0;
    z-index:5;
    width:var(--left-w);
    min-width:var(--left-w);
    padding:8px 12px;
    background:#f1f5f9;
    border-right:2px solid var(--grid-strong);
    border-bottom:1px solid var(--grid);
    color:var(--muted);
    font-size:12px;
    text-align:left;
  }
  .month-row th{
    padding:6px 0;
    border-bottom:1px solid var(--grid);
    border-left:1px solid var(--grid-strong);
    background:#f8fafc;
    color:var(--ink);
    font-size:13px;
    font-weight:800;
    text-align:center;
  }
  .week-row th{
    border-bottom:1px solid var(--grid-strong);
    border-left:1px solid var(--grid);
    background:#fbfcfe;
  }
  td.label{
    position:sticky;
    left:0;
    z-index:4;
    width:var(--left-w);
    min-width:var(--left-w);
    padding:7px 12px;
    background:var(--bg);
    border-right:2px solid var(--grid-strong);
    border-bottom:1px solid var(--grid);
    font-size:13px;
  }
  td.label .ev{font-weight:700;}
  td.label .meta{color:var(--muted);font-size:11px;margin-top:2px;line-height:1.35;}
  .tag{display:inline-block;font-size:10px;padding:1px 5px;border-radius:4px;margin-left:6px;vertical-align:middle;}
  .tag.fix{background:#dcfce7;color:#166534;}
  .tag.tent{background:#fef3c7;color:#92400e;}
  .tag.plan{background:#e0f2fe;color:#075985;}
  .tag.done{background:#e5e7eb;color:#374151;}
  tr.group td{
    position:sticky;
    left:0;
    z-index:4;
    padding:8px 12px;
    background:linear-gradient(90deg,var(--gc),transparent);
    border-top:2px solid var(--grid-strong);
    border-bottom:1px solid var(--grid);
    color:#fff;
    font-size:14px;
    font-weight:800;
  }
  tr.group td .gname{color:#fff;text-shadow:0 1px 1px rgba(0,0,0,.25);}
  tr.group td.timeline-bg{background:#f8fafc;border-left:none;}
  td.timeline{
    position:relative;
    border-bottom:1px solid var(--grid);
    background-image:repeating-linear-gradient(90deg,transparent,transparent calc(var(--day-w)*7 - 1px),var(--grid) calc(var(--day-w)*7 - 1px),var(--grid) calc(var(--day-w)*7));
  }
  .monthline{position:absolute;top:0;bottom:0;width:1px;background:var(--grid-strong);z-index:1;}
  .todayline{position:absolute;top:0;bottom:0;width:2px;background:#ef4444;z-index:3;opacity:.75;}
  .bar{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    height:18px;
    z-index:2;
    display:flex;
    align-items:center;
    border-radius:9px;
    padding:0 8px;
    color:#fff;
    font-size:10px;
    font-weight:800;
    white-space:nowrap;
    box-shadow:0 1px 2px rgba(0,0,0,.2);
  }
  .bar.tent{opacity:.92;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.25) 0 4px,transparent 4px 8px);}
  .bar.done{opacity:.62;}
  .bar .lbl{position:absolute;left:calc(100% + 6px);color:var(--ink);font-size:10px;font-weight:700;white-space:nowrap;}
  .footnote{font-size:11px;color:var(--muted);margin-top:12px;line-height:1.6;}
</style>
</head>

    <div class="chart-wrap">

function buildCalendar(){
  const months = [];
  let cur = new Date(START);
  while(cur < END){
    const mStart = new Date(cur.getFullYear(), cur.getMonth(), 1);
    const next = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
    const s = mStart < START ? START : mStart;
    const e = next > END ? END : next;
    months.push({label:(cur.getMonth()+1)+'월', days:daysFromStart(e)-daysFromStart(s)});
    cur = next;
  }
  const weeks = [];
  const w = new Date(START);
  while(w.getDay()!==1) w.setDate(w.getDate()+1);
  while(w < END){
    weeks.push(new Date(w));
    w.setDate(w.getDate()+7);
  }
  return {months,weeks,totalW:daysFromStart(END)*DAY};
}

const calendar = buildCalendar();

function timelineDecor(){
  let html = '';
  let acc = 0;
  calendar.months.forEach((m,i) => {
    if(i>0) html += `<span class="monthline" style="left:${acc*DAY}px"></span>`;
    acc += m.days;
  });
  if(TODAY >= START && TODAY < END){
    html += `<span class="todayline" style="left:${daysFromStart(TODAY)*DAY}px" title="오늘 ${iso(TODAY)}"></span>`;
  }
  return html;
}

function renderGantt(tableId, projects, leftTitle){
  const tbl = document.getElementById(tableId);
  let html = `<tr class="month-row"><th class="corner" rowspan="2">${leftTitle}</th>`;
  calendar.months.forEach(m => {
    html += `<th style="min-width:${m.days*DAY}px;width:${m.days*DAY}px">${m.label}</th>`;
  });
  html += '</tr>';
  html += `<tr class="week-row"><th style="position:relative;padding:0;width:${calendar.totalW}px;min-width:${calendar.totalW}px"><div style="position:relative;height:18px">`;
  calendar.weeks.forEach(mon => {
    html += `<span style="position:absolute;left:${daysFromStart(mon)*DAY}px;top:2px;font-size:9px;color:#94a3b8;border-left:1px solid var(--grid);padding-left:2px;height:14px">${mon.getMonth()+1}/${mon.getDate()}</span>`;
  });
  html += '</div></th></tr>';
  tbl.innerHTML = html;

  projects.forEach(p => {
    const group = document.createElement('tr');
    group.className = 'group';
    group.innerHTML = `<td style="--gc:${colorHex[p.key] || colorHex.chapter}"><span class="gname">${p.name}</span></td>`+
      `<td class="timeline-bg" style="position:relative">${timelineDecor()}</td>`;
    tbl.appendChild(group);

    p.events.forEach(e => {
      const start = pd(e.start || e.date);
      const end = pd(e.end || e.date);
      const dlabel = rangeLabel(start,end);
      const tagText = e.status==='fix' ? '확정' : e.status==='tent' ? '가안' : e.status==='done' ? '완료' : '계획';
      const meta = [dlabel, e.region, e.note].filter(Boolean).join(' · ');
      const tr = document.createElement('tr');
      tr.innerHTML = `<td class="label"><div class="ev">${e.ev}<span class="tag ${e.status}">${tagText}</span></div>`+
        `<div class="meta">${meta}</div></td>`+
        `<td class="timeline" style="width:${calendar.totalW}px;min-width:${calendar.totalW}px">${timelineDecor()}</td>`;
      tbl.appendChild(tr);

      const x = daysFromStart(start)*DAY;
      const barDays = Math.max(1, daysFromStart(end) - daysFromStart(start) + 1);
      const bar = document.createElement('div');
      bar.className = `bar ${e.status === 'tent' ? 'tent' : ''} ${e.status === 'done' ? 'done' : ''}`;
      bar.style.background = colorHex[p.key] || colorHex.chapter;
      bar.style.left = `${x}px`;
      bar.style.width = `${Math.max(26, barDays*DAY)}px`;
      bar.innerHTML = `<span class="lbl">${dlabel} · ${e.region}</span>`;
      tr.querySelector('.timeline').appendChild(bar);
    });
  });
}

function todayLegend(){
  return `&nbsp;|&nbsp; <span class="tag fix">확정/픽스</span> <span class="tag tent">가안(빗금)</span> <span class="tag plan">계획</span> <span style="color:#ef4444;font-weight:700;">│</span> 오늘(${TODAY.getMonth()+1}/${TODAY.getDate()})`;
}
